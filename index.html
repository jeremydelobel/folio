<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jérémy Delobel - Monteur vidéo / Photographe</title>
    <base href="/" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="page-transition" aria-hidden="true"></div>

    <main class="landing">
      <button class="shop-button text-reveal-mask text-line-1" type="button">
        <span class="text-reveal-value">
          <span class="shop-button-label">Shop</span>
          <span class="shop-button-status">Bientôt</span>
        </span>
      </button>

      <section class="intro meta-block" aria-label="Presentation">
        <div class="text-reveal-mask text-line-1">
          <h1 class="meta-title text-reveal-value" data-i18n="name">
            Jérémy "Kota" Delobel
          </h1>
        </div>
        <div class="text-reveal-mask text-line-2">
          <p class="meta-subtitle text-reveal-value" data-i18n="roles">
            Monteur Vidéo, Motion Designer &amp; Photographe
          </p>
        </div>
      </section>

      <section class="location meta-block" aria-label="Localisation">
        <div class="text-reveal-mask text-line-1">
          <p class="meta-title text-reveal-value" data-i18n="locationLine1">
            Basé en France,
          </p>
        </div>
        <div class="text-reveal-mask text-line-2">
          <p class="meta-subtitle text-reveal-value" data-i18n="locationLine2">
            à Angoulême
          </p>
        </div>
      </section>

      <section class="categories" aria-label="Categories">
        <article class="category-card" data-route="/video-editing">
          <div class="category-inner">
            <div class="category-frame">
              <div class="category-visual">
                <video
                  class="category-video"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="metadata"
                >
                  <source
                    src="./rsrc/Thumbnail - VIDEO EDITING.mp4"
                    type="video/mp4"
                  />
                </video>
              </div>
            </div>
            <div class="category-label-mask">
              <p><span class="category-label-value" data-i18n="cardVideo">MONTAGE VIDÉO</span></p>
            </div>
          </div>
        </article>

        <article class="category-card" data-route="/photography">
          <div class="category-inner">
            <div class="category-frame">
              <div class="category-visual">
                <video
                  class="category-video"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="metadata"
                >
                  <source
                    src="./rsrc/Thumbnail - PHOTOGRAPHY.mp4"
                    type="video/mp4"
                  />
                </video>
              </div>
            </div>
            <div class="category-label-mask">
              <p><span class="category-label-value" data-i18n="cardPhotography">PHOTOGRAPHIE</span></p>
            </div>
          </div>
        </article>

        <article class="category-card">
          <div class="category-inner">
            <div class="category-frame">
              <div class="category-visual">
                <video
                  class="category-video"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="metadata"
                >
                  <source
                    src="./rsrc/Thumbnail - MOTION DESIGN.mp4"
                    type="video/mp4"
                  />
                </video>
              </div>
            </div>
            <div class="category-label-mask">
              <p>
                <span class="category-label-value" data-i18n="cardMotion">MOTION DESIGN</span>
                <span class="category-status" data-i18n="comingSoon">Bientôt</span>
              </p>
            </div>
          </div>
        </article>
      </section>

      <nav class="social-links social-links-fixed" aria-label="Réseaux sociaux">
        <a
          class="social-link"
          href="https://x.com/kotarow28"
          target="_blank"
          rel="noreferrer"
          aria-label="X"
        >
          <img src="./rsrc/social-icons/x.svg" alt="" />
        </a>
        <a
          class="social-link"
          href="https://www.instagram.com/jeremy.delobel/"
          target="_blank"
          rel="noreferrer"
          aria-label="Instagram"
        >
          <img src="./rsrc/social-icons/instagram.svg" alt="" />
        </a>
        <a
          class="social-link"
          href="mailto:kotarow.montage@gmail.com"
          aria-label="Mail"
        >
          <img src="./rsrc/social-icons/mail.svg" alt="" />
        </a>
      </nav>
    </main>
  </body>
</html>
